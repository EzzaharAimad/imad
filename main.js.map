<div class="wrapper">
  <app-header
    [page]="page"
    (pageChange)="page = $event"
  ></app-header>

  <main class="page-body">
    <app-home *ngIf="page === 'home'"></app-home>
    <app-newsletter *ngIf="page === 'newsletter'"></app-newsletter>
  </main>

  <app-footer></app-footer>
</div>
