<header class="header">

  <div
    class="mobile-menu-btn"
    (click)="menuOpen = !menuOpen"
    [class.open]="menuOpen"
  >
    {{ menuOpen ? '☓' : '☰' }}
  </div>

  <nav class="nav" [class.open]="menuOpen">
    <a (click)="goTo('home')">HOME</a>
    <a (click)="goTo('videos')">VIDEOS</a>
    <a (click)="goTo('store')">STORE</a>
    <a (click)="goTo('shows')">SHOWS</a>
    <a (click)="goTo('newsletter')">SIGN UP</a>
    <a href="https://imadffs.tumblr.com" target="_blank">TUMBLR</a>
  </nav>

  <div class="logo-wrap">
    <img
      class="logo-image"
      src="assets/Imad-logo.png"
      alt="Imad logo"
    />
  </div>

</header>
